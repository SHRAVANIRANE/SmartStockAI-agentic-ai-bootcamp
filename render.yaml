services:
  - type: web
    name: inventory-forecasting-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemma-3-1b-it
      - key: LLM_TEMPERATURE
        value: "0.1"
      - key: FORECAST_HORIZON_DAYS
        value: "30"
      - key: SAFETY_STOCK_MULTIPLIER
        value: "1.5"
      - key: LEAD_TIME_DAYS
        value: "7"
